<?php

$data=json_decode(file_get_contents("php://input"),true);
$board=$data["board"];

$wins=[

[0,1,2],
[3,4,5],
[6,7,8],

[0,3,6],
[1,4,7],
[2,5,8],

[0,4,8],
[2,4,6]

];

foreach($wins as $w){

$a=$w[0];
$b=$w[1];
$c=$w[2];

if($board[$a]!="" &&
$board[$a]==$board[$b] &&
$board[$a]==$board[$c]){

echo json_encode(["winner"=>$board[$a]]);
exit;

}

}

echo json_encode(["winner"=>null]);
